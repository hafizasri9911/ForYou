<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07152f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>A Little Surprise</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

  <script>
    window.tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            body: ["Nunito", "system-ui", "sans-serif"],
            display: ["Playfair Display", "Georgia", "serif"]
          },
          colors: {
            ink: "#f8f2ff",
            navy: "#07152f",
            midnight: "#0b1f4a",
            ocean: "#123d7a",
            rose: "#ff4f9a",
            blush: "#ff9bc3",
            cream: "#fff4ea"
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --navy: #07152f;
      --navy-2: #0b1f4a;
      --blue: #1553a4;
      --pink: #ff4f9a;
      --pink-2: #ff9bc3;
      --cream: #fff4ea;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: var(--navy);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-x: none;
    }

    body {
      color: #fff;
      font-family: "Nunito", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: 50px;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .app-shell {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      min-height: var(--app-height);
      padding:
        calc(18px + var(--safe-top))
        max(18px, var(--safe-right))
        calc(24px + var(--safe-bottom))
        max(18px, var(--safe-left));
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 79, 154, 0.28), transparent 38%),
        radial-gradient(circle at 12% 18%, rgba(32, 115, 210, 0.38), transparent 28%),
        linear-gradient(145deg, #07152f 0%, #0c2050 44%, #12245d 67%, #ff5ca7 140%);
    }

    .aurora {
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.68;
      background:
        conic-gradient(from 180deg at 42% 45%, transparent 0 20%, rgba(255, 79, 154, 0.32) 29%, transparent 42%, rgba(34, 116, 220, 0.36) 55%, transparent 72%, rgba(255, 174, 206, 0.24) 82%, transparent 100%),
        linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      filter: blur(34px) saturate(1.2);
      animation: auroraMove 13s ease-in-out infinite alternate;
    }

    .star-field {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .floating-heart {
      position: absolute;
      left: var(--x);
      bottom: -40px;
      color: rgba(255, 155, 195, 0.52);
      font-size: var(--s);
      filter: drop-shadow(0 8px 18px rgba(255, 79, 154, 0.18));
      animation: floatUp var(--d) linear infinite;
      animation-delay: var(--delay);
      will-change: transform, opacity;
    }

    .glass {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08));
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.28);
      -webkit-backdrop-filter: blur(24px) saturate(1.22);
      backdrop-filter: blur(24px) saturate(1.22);
    }

    .shine-button {
      position: relative;
      overflow: hidden;
      transform: translateZ(0);
    }

    .shine-button::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(105deg, transparent 20%, rgba(255, 255, 255, 0.46) 45%, transparent 62%);
      transform: translateX(-110%);
      animation: buttonShine 3.4s ease-in-out infinite;
    }

    .screen-enter {
      animation: screenEnter 520ms cubic-bezier(0.2, 0.82, 0.22, 1) both;
    }

    .tap-pulse {
      animation: tapPulse 2.2s ease-in-out infinite;
    }

    .meter-spark {
      animation: meterGlow 2s ease-in-out infinite;
    }

    .loading-track,
    .meter-track {
      position: relative;
      overflow: hidden;
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 1px 8px rgba(5, 14, 40, 0.22);
    }

    .loading-track::after,
    .meter-track::after {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.34), transparent);
      transform: translateX(-100%);
      animation: trackShine 1.8s ease-in-out infinite;
    }

    .loading-fill,
    .meter-fill-native {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff4f9a 0%, #ff9bc3 45%, #3aa0ff 100%);
      box-shadow: 0 0 22px rgba(255, 79, 154, 0.46);
      transition: width 260ms cubic-bezier(0.2, 0.82, 0.22, 1);
    }

    .loading-percent {
      display: inline-flex;
      min-width: 58px;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      padding: 6px 10px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 900;
    }

    .envelope {
      width: min(100%, 350px);
      height: 250px;
      position: relative;
      perspective: 1200px;
      transform-style: preserve-3d;
      animation: envelopeFloat 3.6s ease-in-out infinite;
    }

    .envelope-base {
      position: absolute;
      inset: 0;
      overflow: visible;
      border-radius: 34px;
      background:
        linear-gradient(135deg, #ffe8f4 0%, #ffc1dc 48%, #8db5ff 100%),
        linear-gradient(45deg, #ff4f9a 0 50%, #3f7ee9 50% 100%);
      box-shadow: 0 24px 62px rgba(255, 79, 154, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.36);
    }

    .envelope-pocket {
      position: absolute;
      inset: 42% 0 0;
      z-index: 4;
      border-radius: 0 0 34px 34px;
      background:
        linear-gradient(135deg, transparent 49%, #ff4f9a 50%) left bottom / 50% 100% no-repeat,
        linear-gradient(225deg, transparent 49%, #4f86ea 50%) right bottom / 50% 100% no-repeat,
        linear-gradient(180deg, #ffc4df, #f26ca7);
    }

    .envelope-flap {
      position: absolute;
      inset: 0 0 auto;
      z-index: 7;
      height: 142px;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      border-radius: 34px 34px 18px 18px;
      background: linear-gradient(145deg, #fff4fb 0%, #ffb1d2 54%, #86adff 100%);
      box-shadow: 0 18px 28px rgba(5, 14, 40, 0.2);
      transform-origin: top center;
      backface-visibility: hidden;
      transition: transform 950ms cubic-bezier(0.17, 0.88, 0.2, 1.04), opacity 950ms ease, filter 950ms ease;
    }

    .envelope.open .envelope-flap {
      opacity: 0.92;
      filter: drop-shadow(0 -18px 25px rgba(255, 79, 154, 0.16));
      transform: rotateX(178deg) translateY(-8px);
    }

    .envelope-letter {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 20px;
      z-index: 3;
      min-height: 142px;
      display: grid;
      place-items: center;
      border-radius: 26px;
      color: #0b1f4a;
      background:
        linear-gradient(180deg, #fff8fd, #ffeaf3),
        repeating-linear-gradient(0deg, transparent 0 22px, rgba(255, 79, 154, 0.08) 22px 23px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
      opacity: 0;
      transform: translateY(52px) scale(0.94);
      transition: transform 950ms cubic-bezier(0.17, 0.88, 0.2, 1.04), box-shadow 950ms ease, opacity 420ms ease;
    }

    .envelope.open .envelope-letter {
      z-index: 6;
      opacity: 1;
      box-shadow: 0 26px 54px rgba(255, 79, 154, 0.26);
      transform: translateY(-66px) scale(1.02) rotate(-1deg);
    }

    .envelope-seal {
      position: absolute;
      top: 105px;
      left: 50%;
      z-index: 8;
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-size: 1.45rem;
      background: linear-gradient(135deg, #ff4f9a, #ff9bc3);
      border: 1px solid rgba(255, 255, 255, 0.54);
      box-shadow: 0 18px 30px rgba(255, 79, 154, 0.32);
      transform: translateX(-50%);
      transition: opacity 420ms ease, transform 600ms ease;
    }

    .envelope.open .envelope-seal {
      opacity: 0;
      transform: translateX(-50%) translateY(-18px) scale(0.42) rotate(18deg);
    }

    .heart-gallery {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-rows: clamp(58px, 16vw, 76px);
      gap: 10px;
      position: relative;
      isolation: isolate;
    }

    .heart-gallery::before {
      content: "";
      position: absolute;
      inset: 8px 6px 10px;
      z-index: -1;
      background:
        radial-gradient(circle at 35% 24%, rgba(255, 255, 255, 0.55), transparent 30%),
        radial-gradient(circle at 66% 24%, rgba(255, 255, 255, 0.42), transparent 30%),
        linear-gradient(145deg, rgba(255, 79, 154, 0.42), rgba(28, 105, 219, 0.28));
      clip-path: polygon(50% 94%, 11% 59%, 4% 36%, 12% 15%, 30% 5%, 44% 15%, 50% 27%, 56% 15%, 70% 5%, 88% 15%, 96% 36%, 89% 59%);
      filter: drop-shadow(0 22px 34px rgba(255, 79, 154, 0.18));
      animation: heartGlow 4s ease-in-out infinite;
    }

	    .gallery-tile {
	      position: relative;
	      overflow: hidden;
	      min-height: 100%;
	      border-radius: 24px;
	      border: 1px solid rgba(255, 255, 255, 0.2);
	      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.24);
	      background: rgba(255, 255, 255, 0.1);
	      transform: translateZ(0) rotate(var(--tilt));
	      transition: transform 180ms ease, box-shadow 180ms ease;
	    }

	    .gallery-tile:active {
	      transform: translateZ(0) rotate(var(--tilt)) scale(0.985);
	      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
	    }

    .gallery-tile::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.3), transparent 35%),
        linear-gradient(180deg, transparent 42%, rgba(7, 21, 47, 0.54));
    }

	    .gallery-tile img {
	      width: 100%;
	      height: 100%;
	      object-fit: cover;
	      transform: scale(1.06);
	      animation: photoFloat 5.4s ease-in-out infinite;
	      animation-delay: var(--delay);
	      will-change: transform, filter;
	    }

    .tile-0 { grid-column: 1 / 3; grid-row: 1 / 3; }
    .tile-1 { grid-column: 3 / 5; grid-row: 1 / 3; }
    .tile-2 { grid-column: 1 / 5; grid-row: 3 / 5; }
    .tile-3 { grid-column: 1 / 3; grid-row: 5 / 7; }
    .tile-4 { grid-column: 3 / 5; grid-row: 5 / 7; }
    .tile-5 { grid-column: 2 / 4; grid-row: 7 / 9; }

    .note-sheet {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 80;
      padding:
        18px
        max(18px, var(--safe-right))
        calc(18px + var(--safe-bottom))
        max(18px, var(--safe-left));
      animation: sheetIn 260ms cubic-bezier(0.2, 0.82, 0.22, 1) both;
    }

    .reveal-pop {
      opacity: 0;
      transform: translateY(18px) scale(0.985);
      transition: opacity 540ms ease, transform 540ms cubic-bezier(0.2, 0.82, 0.22, 1);
    }

    .reveal-pop.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    @keyframes auroraMove {
      from { transform: translate3d(-3%, -2%, 0) rotate(-4deg) scale(1); }
      to { transform: translate3d(4%, 3%, 0) rotate(5deg) scale(1.06); }
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translate3d(0, 0, 0) rotate(0deg); }
      12% { opacity: 1; }
      100% { opacity: 0; transform: translate3d(var(--drift), -112vh, 0) rotate(26deg); }
    }

    @keyframes buttonShine {
      0%, 42% { transform: translateX(-110%); }
      64%, 100% { transform: translateX(110%); }
    }

    @keyframes trackShine {
      0%, 35% { transform: translateX(-110%); opacity: 0; }
      55% { opacity: 1; }
      100% { transform: translateX(110%); opacity: 0; }
    }

    @keyframes screenEnter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes tapPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 18px 36px rgba(255, 79, 154, 0.22); }
      50% { transform: scale(1.025); box-shadow: 0 26px 52px rgba(255, 79, 154, 0.34); }
    }

    @keyframes envelopeFloat {
      0%, 100% { transform: translateY(0) rotate(-0.6deg); }
      50% { transform: translateY(-8px) rotate(0.6deg); }
    }

    @keyframes heartGlow {
      0%, 100% { opacity: 0.72; transform: scale(1); }
      50% { opacity: 0.98; transform: scale(1.025); }
    }

	    @keyframes photoFloat {
	      0%, 100% { filter: saturate(1.06); transform: scale(1.06) translate3d(0, 0, 0); }
	      50% { filter: saturate(1.2); transform: scale(1.13) translate3d(0, -4px, 0); }
	    }

    @keyframes meterGlow {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(255, 79, 154, 0)); }
      50% { filter: drop-shadow(0 0 18px rgba(255, 79, 154, 0.46)); }
    }

    @keyframes sheetIn {
      from { opacity: 0; transform: translateY(26px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    /*
      EDIT THIS PART ONLY:
      Change the names, messages, image links, notes, and music link below.
    */
    const CONFIG = {
      recipientName: "Sayang",
      senderName: "Me",
      mainMessage: `I don't know how to say this perfectly, but I just want you to know...

You are one of the reasons my ordinary days feel a little more special.

I made this little page just for you, because you deserve something sweet today.`,
      finalConfession: `Actually... I like you.

Not because of one big reason,
but because of all the little things about you.`,
      imageLinks: [
        "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=900&q=80",
        "https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=900&q=80",
        "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=900&q=80",
        "https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=900&q=80",
        "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=900&q=80",
        "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=900&q=80"
      ],
      musicLink: "",
      galleryNotes: [
        "Secret note: this photo is just an excuse to say awak comel.",
        "Tiny confession: I hope this made your heart do a small jump.",
        "Soft reminder: you deserve all the sweet things, including this one.",
        "Eeeee awak ni haa. This little moment feels extra special because it is for you.",
        "If I could put this feeling in a frame, it would look exactly this soft.",
        "Last gallery note: jangan buat-buat cool. I know this is cute."
      ]
    };

    const teaseMessages = [
      "Eh eh jangan lari 😭",
      "Cuba lagi hehe",
      "Tak boleh reject awal-awal 😤",
      "Button ni malu sikit",
      "No option unavailable 😌",
      "Ala tekan yang satu lagi lah 😭"
    ];

    const spotMessages = [
      "Eeeee awak ni haa, why are you making this page nervous?",
      "Okay fine, second secret: your smile is a little dangerous.",
      "No pressure, but this button thinks you are very, very cute.",
      "Alaaa jangan malu. This whole page is already blushing for you.",
      "If I could put a ribbon on this moment, I would. Pink one, obviously.",
      "Last one: I hope you know you are special in the softest way."
    ];

    const blushMessages = [
      "Hmm okay, detected: tiny smile.",
      "Aha caught you. Senyum tu nampak cute, sorry.",
      "Eeeee awak ni haa. The meter is panicking.",
      "Okay now this is officially sweet. Jangan buat muka cool.",
      "Full blush. Website dah surrender. You win."
    ];

    function useAppHeight() {
      useEffect(() => {
        const setHeight = () => {
          const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
          document.documentElement.style.setProperty("--app-height", `${height}px`);
        };
        setHeight();
        window.addEventListener("resize", setHeight);
        window.visualViewport?.addEventListener("resize", setHeight);
        window.visualViewport?.addEventListener("scroll", setHeight);
        return () => {
          window.removeEventListener("resize", setHeight);
          window.visualViewport?.removeEventListener("resize", setHeight);
          window.visualViewport?.removeEventListener("scroll", setHeight);
        };
      }, []);
    }

    function useRevealObserver(screen) {
      useEffect(() => {
        if (screen !== "surprise") return;
        const items = document.querySelectorAll(".reveal-pop");
        if (!("IntersectionObserver" in window)) {
          items.forEach((item) => item.classList.add("is-visible"));
          return;
        }
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
        items.forEach((item, index) => {
          item.style.transitionDelay = `${Math.min(index * 35, 220)}ms`;
          observer.observe(item);
        });
        return () => observer.disconnect();
      }, [screen]);
    }

    function vibrate(pattern = 18) {
      if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    function burstConfetti() {
      if (!window.confetti) return;
      window.confetti({
        particleCount: 90,
        spread: 72,
        origin: { y: 0.58 },
        colors: ["#ff4f9a", "#ff9bc3", "#1d6fe3", "#ffffff", "#ffe3f0"]
      });
    }

    function heartConfetti() {
      if (!window.confetti) return;
      window.confetti({
        particleCount: 18,
        spread: 42,
        scalar: 1.05,
        shapes: ["circle", "star"],
        origin: { y: 0.72 },
        colors: ["#ff4f9a", "#ff9bc3", "#ffffff"]
      });
    }

    function paragraphs(text) {
      return text.trim().split(/\n\s*\n/);
    }

    function Screen({ children, center = false }) {
      return (
        <section className={`screen-enter relative z-10 min-h-[var(--app-height)] w-full ${center ? "grid place-items-center" : ""}`}>
          {children}
        </section>
      );
    }

    function PrimaryButton({ children, className = "", ...props }) {
      return (
        <button
          {...props}
          className={`shine-button min-h-[56px] w-full rounded-[22px] bg-gradient-to-r from-rose via-blush to-blue-500 px-5 py-4 text-base font-black text-white shadow-[0_18px_42px_rgba(255,79,154,.28)] active:scale-[.975] transition ${className}`}
        >
          {children}
        </button>
      );
    }

    function IntroScreen({ onStart }) {
      const [attempts, setAttempts] = useState(0);
      const [tease, setTease] = useState("");
      const [fixed, setFixed] = useState(false);
      const [pos, setPos] = useState(null);
      const [gone, setGone] = useState(false);
      const noBtnRef = useRef(null);
      const actionsRef = useRef(null);
      const lastRunRef = useRef(0);
      const lastTouchRef = useRef(0);

      const shouldHandle = (event) => {
        const now = Date.now();
        const type = event?.type || "manual";
        const pointerType = event?.pointerType;

        if (type === "touchstart") lastTouchRef.current = now;
        if (type === "pointerdown" && pointerType === "touch") {
          if (now - lastTouchRef.current < 700) return false;
          lastTouchRef.current = now;
        }
        if (type === "click" && now - lastRunRef.current < 700) return false;
        if (now - lastRunRef.current < 430) return false;

        lastRunRef.current = now;
        return true;
      };

      const runAway = (event) => {
        event?.preventDefault?.();
        event?.stopPropagation?.();
        if (gone || !shouldHandle(event)) return;

        const btn = noBtnRef.current;
        const arena = actionsRef.current;
        if (!btn || !arena) return;
        const nextAttempts = attempts + 1;
        setAttempts(nextAttempts);
        setTease(teaseMessages[(nextAttempts - 1) % teaseMessages.length]);
        vibrate(22);

        if (nextAttempts >= 5) {
          setGone(true);
          setTease("Okay fine, no button retired 😌");
          return;
        }

        const rect = btn.getBoundingClientRect();
        const arenaRect = arena.getBoundingClientRect();
        const buttonWidth = Math.min(rect.width, Math.max(168, arenaRect.width * 0.72));
        const margin = 8;
        const minLeft = margin;
        const minTop = 66;
        const maxLeft = Math.max(minLeft, arenaRect.width - buttonWidth - margin);
        const maxTop = Math.max(minTop, arenaRect.height - rect.height - margin);
        let left = Math.random() * (maxLeft - minLeft) + minLeft;
        let top = Math.random() * (maxTop - minTop) + minTop;

        const currentLeft = rect.left - arenaRect.left;
        const currentTop = rect.top - arenaRect.top;
        if (Math.abs(left - currentLeft) < 42) left = currentLeft < arenaRect.width / 2 ? maxLeft : minLeft;
        if (Math.abs(top - currentTop) < 24) top = currentTop < arenaRect.height / 2 ? maxTop : minTop;

        setFixed(true);
        setPos({
          left: Math.min(Math.max(left, minLeft), Math.max(minLeft, maxLeft)),
          top: Math.min(Math.max(top, minTop), Math.max(minTop, maxTop)),
          width: buttonWidth
        });
      };

      return (
        <Screen center>
          <div className="w-full max-w-[440px]">
            <div className="glass rounded-[34px] p-7 text-center sm:p-9">
              <p className="mx-auto mb-5 inline-flex min-h-[34px] items-center rounded-full border border-white/20 bg-white/10 px-4 text-sm font-black text-pink-100">
                tiny serious announcement
              </p>
              <h1 className="font-display text-[clamp(2.4rem,11vw,3.8rem)] leading-[.96] text-white">
                I have something important to tell you...
              </h1>
              <p className="mx-auto mt-5 max-w-[22rem] text-[1.05rem] font-extrabold leading-relaxed text-pink-50/80">
                Tapi kena tekan button dulu 😌 jangan buat-buat cool.
              </p>

              <div ref={actionsRef} className="relative mt-7 grid min-h-[158px] gap-3">
                <PrimaryButton id="tellMeBtn" onClick={onStart}>Tell me ❤️</PrimaryButton>
                {!gone && (
                  <button
                    id="noThanksBtn"
                    ref={noBtnRef}
                    type="button"
                    onTouchStart={runAway}
                    onPointerDown={runAway}
                    onMouseEnter={runAway}
                    onClick={runAway}
                    style={fixed && pos ? { position: "absolute", left: pos.left, top: pos.top, width: pos.width, zIndex: 30, boxSizing: "border-box" } : undefined}
                    className="min-h-[56px] rounded-[22px] border border-white/20 bg-white/12 px-5 py-4 text-base font-black text-white shadow-[0_18px_42px_rgba(0,0,0,.18)] backdrop-blur-xl transition-[left,top,transform,opacity] duration-300 active:scale-[.975]"
                  >
                    No thanks 🙄
                  </button>
                )}
              </div>

              <p className="mt-5 min-h-6 text-sm font-black text-pink-100" aria-live="polite">
                {tease}
              </p>
            </div>
          </div>
        </Screen>
      );
    }

    function LoadingScreen() {
      const [progress, setProgress] = useState(6);

      useEffect(() => {
        const startedAt = Date.now();
        const timer = window.setInterval(() => {
          const elapsed = Date.now() - startedAt;
          const next = Math.min(100, Math.round(6 + (elapsed / 2850) * 94));
          setProgress(next);
          if (next >= 100) window.clearInterval(timer);
        }, 120);
        return () => window.clearInterval(timer);
      }, []);

      return (
        <Screen center>
          <div className="w-full max-w-[440px]">
            <div className="glass rounded-[34px] p-7 text-center sm:p-9">
              <p className="mx-auto mb-5 inline-flex min-h-[34px] items-center rounded-full border border-white/20 bg-white/10 px-4 text-sm font-black text-pink-100">
                very official test
              </p>
              <h2 className="font-display text-[clamp(2rem,9vw,3rem)] leading-none text-white">
                Checking if you deserve this surprise...
              </h2>
              <p className="mx-auto mt-5 max-w-[22rem] text-base font-extrabold leading-relaxed text-pink-50/80">
                Scanning smile level... hmm suspiciously cute.
              </p>
              <div className="mt-7 flex items-center justify-between gap-3">
                <span className="text-sm font-black text-pink-100/80">Progress</span>
                <span className="loading-percent">{progress}%</span>
              </div>
              <div className="loading-track mt-3">
                <div className="loading-fill" style={{ width: `${progress}%` }}></div>
              </div>
              <p className="mt-4 text-sm font-black text-white/62">
                {progress < 40 ? "Checking cute level..." : progress < 78 ? "Finding hidden smile..." : "Almost ready..."}
              </p>
            </div>
          </div>
        </Screen>
      );
    }

    function EnvelopeScreen({ onDone }) {
      const [open, setOpen] = useState(false);

      const openEnvelope = () => {
        if (open) return;
        setOpen(true);
        vibrate([16, 38, 16]);
        heartConfetti();
        setTimeout(() => {
          onDone();
          setTimeout(heartConfetti, 280);
        }, 1180);
      };

      return (
        <Screen center>
          <div className="grid w-full max-w-[440px] justify-items-center text-center">
            <h2 className="font-display text-[clamp(2.3rem,10vw,3.6rem)] leading-none text-white">
              Open this little surprise

            <p className="mx-auto mt-4 max-w-[22rem] text-base font-extrabold leading-relaxed text-pink-50/80">
              One tap. Lepas tu jangan kata I tak warning kalau jadi sweet sangat.
            </p>

            <button type="button" onClick={openEnvelope} className="mt-8 grid w-full place-items-center" aria-label="Open this little surprise">
              <div className={`envelope ${open ? "open" : ""}`}>
                <div className="envelope-base"></div>
                <div className="envelope-letter">
                  <span className="font-display text-4xl font-black">For you 💌</span>
                </div>
                <div className="envelope-pocket"></div>
                <div className="envelope-flap"></div>
                <div className="envelope-seal">♥</div>
              </div>
            </button>

            <p className="mt-5 text-base font-black text-pink-100 tap-pulse">Tap the envelope</p>
          </div>
        </Screen>
      );
    }

        { "--tilt": "3deg", "--tilt-soft": "1deg", "--delay": "-1.1s" },
        { "--tilt": "-1deg", "--tilt-soft": "1.5deg", "--delay": "-1.8s" },
        { "--tilt": "2deg", "--tilt-soft": "0deg", "--delay": "-0.8s" },
        { "--tilt": "-2deg", "--tilt-soft": "-.5deg", "--delay": "-1.4s" },

        <>

          <span className="absolute bottom-2 left-2 right-2 z-10 rounded-2xl bg-navy/54 px-3 py-2 text-left text-xs font-black text-white backdrop-blur-md">
                    Tap note ✨
                  </span>
                </button>
              ))}

          </section>

          {selected !== null && (

                  className="mx-auto max-w-[450px] rounded-[32px] border border-white/20 bg-gradient-to-br from-white/95 to-pink-100/95 p-4 shadow-[0_24px_80px_rgba(0,0,0,.35)]"

                  <div className="grid grid-cols-[96px_1fr] gap-4">
                    <img
                      src={images[selected]}

                      className="h-24 w-24 rounded-[24px] object-cover shadow-lg"
                    />
                    <div>
                      <p className="mb-1 inline-flex rounded-full bg-rose/10 px-3 py-1 text-xs font-black" style={{ color: "#ff4f9a" }}>secret note</p>
                      <h3 className="font-display text-2xl leading-none" style={{ color: "#0b1f4a" }}>{titles[selected]}</h3>
                    </div>
                  </div>
                  <p className="mt-4 text-[1.05rem] font-black leading-relaxed" style={{ color: "rgba(11, 31, 74, 0.78)" }}>
                    {CONFIG.galleryNotes[selected] || "Secret note: this one is for you."}
                  </p>
	                  <button
	                    type="button"
	                    onClick={() => setSelected(null)}
	                    className="note-close mt-4 min-h-[52px] w-full rounded-[20px] bg-gradient-to-r from-midnight to-ocean px-4 py-3 text-base font-black text-white active:scale-[.98]"
	                  >
                    Okay eeee 😳
                  </button>
                </article>
              </div>
            </div>
          )}
        </>
      );
    }

    function SurpriseScreen() {
      const [spotText, setSpotText] = useState("Pick a spot. I promise it is not scary, just a little sweet.");
      const [found, setFound] = useState([]);
      const [blush, setBlush] = useState(12);
      const [blushText, setBlushText] = useState("Tap kalau awak senyum sikit. Jangan tipu, I can sense it.");
      const [musicStatus, setMusicStatus] = useState(CONFIG.musicLink ? "Ready when you tap." : "Add a music link in the code when you're ready.");
      const [playing, setPlaying] = useState(false);
      const [confessionOpen, setConfessionOpen] = useState(false);
      const [answer, setAnswer] = useState("");
      const audioRef = useRef(null);

      const revealSpot = (index) => {
        setSpotText(spotMessages[index]);
        setFound((current) => Array.from(new Set([...current, index])));
        vibrate([10, 24, 10]);
        heartConfetti();
      };

      const increaseBlush = () => {
        const next = Math.min(100, blush + 22);
        const textIndex = Math.min(Math.floor(blush / 22), blushMessages.length - 1);
        setBlush(next);
        setBlushText(blushMessages[textIndex]);
        vibrate(16);
        heartConfetti();
        if (next >= 100) burstConfetti();
      };

      const toggleMusic = async () => {
        if (!CONFIG.musicLink.trim()) {
          setMusicStatus("Music link belum letak, but the mood is still here 🎵");
          vibrate(10);
          return;
        }
        try {
          if (audioRef.current.paused) {
            await audioRef.current.play();
            setPlaying(true);
            setMusicStatus("Now playing softly.");
          } else {
            audioRef.current.pause();
            setPlaying(false);
            setMusicStatus("Paused for now.");
          }
        } catch {
          setMusicStatus("Safari needs a direct tap, try once more.");
        }
      };

      const openConfession = () => {
        setConfessionOpen(true);
        vibrate([12, 26, 12]);
        heartConfetti();
      };

      const chooseAnswer = (type) => {
        if (type === "yes") {
          setAnswer("You just made my day ❤️");
          burstConfetti();
          heartConfetti();
        } else {
          setAnswer("It's okay, no pressure. I just wanted to be honest.");
          heartConfetti();
        }
      };

      return (
        <Screen>
          <div className="mx-auto w-full max-w-[470px] pb-4">
            <article className="reveal-pop glass relative overflow-hidden rounded-[36px] p-7">
              <span className="absolute right-5 top-5 grid h-20 w-20 rotate-12 place-items-center rounded-full border border-white/15 bg-white/10 text-sm font-black text-pink-200">
                awww
              </span>
              <p className="mb-5 inline-flex rounded-full border border-white/15 bg-white/10 px-4 py-2 text-sm font-black text-pink-100">
                made with nervous confidence
              </p>
              <h1 className="font-display text-[clamp(2.5rem,11vw,3.9rem)] leading-[.96] text-white">
                For You,<br />{CONFIG.recipientName} ✨
              </h1>
              <p className="mt-4 text-base font-black text-pink-100/76">From {CONFIG.senderName}</p>
              <div className="mt-7 space-y-5 text-[1.05rem] font-extrabold leading-relaxed text-white/82">
                {paragraphs(CONFIG.mainMessage).map((item, index) => <p key={index}>{item}</p>)}
              </div>
            </article>

            <section className="reveal-pop my-5 grid grid-cols-[auto_1fr] items-center gap-4 rounded-[30px] border border-white/15 bg-white/10 p-4 shadow-xl backdrop-blur-xl">
              <span className="grid h-14 w-14 -rotate-6 place-items-center rounded-[20px] bg-gradient-to-br from-rose to-blue-500 text-base font-black text-white shadow-lg">
                psst
              </span>
              <p className="text-[1rem] font-black leading-relaxed text-white/82">
                Scroll slow-slow okay... ada banyak benda comel tersorok untuk awak.
              </p>
            </section>

            <GallerySection />

            <section className="reveal-pop mt-7">
              <h2 className="mb-3 text-sm font-black uppercase text-pink-100/70">Tiny reasons</h2>
              <div className="grid gap-3">
                {[
                  ["Your kind of smile", "Yang buat orang rasa, eeee kenapa comel sangat ni?"],
                  ["Small moments", "The random little things about you somehow stay rent-free in my head."],
                  ["This page", "A tiny digital bouquet, because feelings as pixels pun boleh jadi sweet."]
                ].map(([title, copy]) => (
                  <article key={title} className="rounded-[28px] border border-white/15 bg-white/10 p-5 shadow-xl backdrop-blur-xl">
                    <h3 className="text-lg font-black text-white">{title}</h3>
                    <p className="mt-2 text-base font-bold leading-relaxed text-white/70">{copy}</p>
                  </article>
                ))}
              </div>
            </section>

            <section className="reveal-pop mt-7 rounded-[32px] border border-white/15 bg-gradient-to-br from-white/16 to-pink-300/10 p-6 shadow-xl backdrop-blur-xl">
              <p className="font-display text-[1.55rem] font-black leading-tight text-white">
                "Some people make the world feel gentler just by being in it."
              </p>
              <span className="mt-3 block text-sm font-black text-pink-100/80">Yes, awak lah tu. Jangan buat-buat tak tahu.</span>
            </section>

            <section className="reveal-pop mt-7 rounded-[32px] border border-white/15 bg-white/10 p-5 shadow-xl backdrop-blur-xl">
              <h2 className="mb-2 text-sm font-black uppercase text-pink-100/70">Surprise spots</h2>
              <p className="mb-4 text-base font-extrabold text-white/76">Tap satu-satu. Kalau tersenyum, kira website ni menang.</p>
              <div className="grid grid-cols-2 gap-3">
                {spotMessages.map((_, index) => (
                  <button
                    key={index}
                    type="button"
                    onClick={() => revealSpot(index)}
                    className={`min-h-[76px] rounded-[22px] border px-3 py-3 text-left text-sm font-black transition active:scale-[.975] ${
                      found.includes(index)
                        ? "border-pink-200/40 bg-gradient-to-br from-rose to-blue-500 text-white"
                        : "border-white/15 bg-white/10 text-white/82"
                    }`}
                  >
                    <span className="block text-lg text-pink-200">{String(index + 1).padStart(2, "0")}</span>
                    {["tekan sini", "secret sikit", "jangan malu", "awak ni haa", "one more", "last-last"][index]}
                  </button>

              </div>
              <div className="mt-4 rounded-[24px] border border-pink-200/20 bg-navy/24 p-4">
                <span className="mb-2 inline-flex rounded-full bg-rose/80 px-3 py-1 text-xs font-black text-white">secret note</span>
                <p className="text-[1.02rem] font-black leading-relaxed text-white/84">{spotText}</p>

            </section>

            <section className="reveal-pop mt-7 rounded-[32px] border border-white/15 bg-white/10 p-5 shadow-xl backdrop-blur-xl">
              <div className="mb-4 flex items-start justify-between gap-3">
                <h2 className="text-lg font-black leading-tight text-white">Current level of "eeee awak ni haa"</h2>
                <span className="rounded-full bg-gradient-to-r from-rose to-blue-500 px-4 py-2 text-base font-black text-white">{blush}%</span>
              </div>
              <div className="meter-track">
                <div
                  className="meter-fill-native meter-spark"
                  style={{ width: `${blush}%` }}
                />
              </div>
              <p className="my-4 min-h-[42px] text-base font-black leading-relaxed text-white/78">{blushText}</p>
              <PrimaryButton onClick={increaseBlush}>I smiled sikit 😳</PrimaryButton>
            </section>

            <section className="reveal-pop mt-7 rounded-[32px] border border-white/15 bg-white/10 p-5 shadow-xl backdrop-blur-xl">
              <h2 className="mb-3 text-sm font-black uppercase text-pink-100/70">Background music</h2>
              <p className="mb-4 text-base font-extrabold leading-relaxed text-white/76">
                Music waits for your tap because iPhone Safari likes consent too.
              </p>
              <PrimaryButton onClick={toggleMusic}>{playing ? "Pause Music ⏸" : "Play Music 🎵"}</PrimaryButton>
              <p className="mt-3 min-h-5 text-center text-sm font-black text-pink-100/75">{musicStatus}</p>
              <audio ref={audioRef} src={CONFIG.musicLink} preload="none" loop playsInline />
            </section>

            <section className="reveal-pop mt-7 rounded-[34px] border border-white/15 bg-gradient-to-br from-white/14 to-pink-300/10 p-6 text-center shadow-xl backdrop-blur-xl">
              <h2 className="font-display text-[2.25rem] leading-none text-white">One tiny thing left...</h2>
              <p className="mx-auto my-4 max-w-[22rem] text-base font-extrabold leading-relaxed text-white/72">
                Okay this part macam nervous sikit. Jangan gelak kuat sangat.
              </p>
              <PrimaryButton onClick={openConfession} disabled={confessionOpen}>
                {confessionOpen ? "Okay, deep breath..." : "One more thing..."}
              </PrimaryButton>

              {confessionOpen && (
                <article className="mt-5 rounded-[28px] border border-white/15 bg-navy/30 p-5 text-left">
                  <div className="space-y-4 text-[1.05rem] font-extrabold leading-relaxed text-white/84">
                    {paragraphs(CONFIG.finalConfession).map((item, index) => <p key={index}>{item}</p>)}
                  </div>
                  <div className="mt-5 grid gap-3">
                    <PrimaryButton onClick={() => chooseAnswer("yes")}>Aww okay ❤️</PrimaryButton>
                    <button
                      type="button"
                      onClick={() => chooseAnswer("time")}
                      className="min-h-[56px] rounded-[22px] border border-white/15 bg-white/10 px-5 py-4 text-base font-black text-white active:scale-[.975]"
                    >
                      I need time 😭
                    </button>
                  </div>
                </article>
              )}

              {answer && (
                <div className="mt-4 rounded-[24px] border border-white/15 bg-white/12 p-4 text-center text-base font-black text-white/86">
                  {answer}
                </div>
              )}
            </section>

            <p className="reveal-pop mx-auto mt-6 max-w-[24rem] text-center text-sm font-black leading-relaxed text-pink-100/68">
              Made to be opened on a phone, smiled at quietly, and maybe reread later.
            </p>
          </div>
        </Screen>
      );
    }

    function App() {
      const [screen, setScreen] = useState("intro");
      useAppHeight();
      useRevealObserver(screen);

      const startLoading = () => {
        vibrate(12);
        setScreen("loading");
        heartConfetti();
        setTimeout(() => setScreen("envelope"), 3200);
      };

      return (
        <main className="app-shell">
          <div className="aurora"></div>
          <div className="star-field" aria-hidden="true">
            {["♥", "✦", "♡", "✧", "♥", "♡", "✦", "♥"].map((item, index) => (
              <span
                key={index}
                className="floating-heart"
                style={{
                  "--x": `${8 + index * 12}%`,
                  "--s": `${index % 2 ? 0.9 : 1.2}rem`,
                  "--d": `${12 + (index % 4)}s`,
                  "--delay": `${-index * 1.7}s`,
                  "--drift": `${index % 2 ? -24 : 24}px`
                }}
              >
                {item}
              </span>
            ))}
          </div>

          {screen === "intro" && <IntroScreen onStart={startLoading} />}
          {screen === "loading" && <LoadingScreen />}
          {screen === "envelope" && <EnvelopeScreen onDone={() => setScreen("surprise")} />}
          {screen === "surprise" && <SurpriseScreen />}
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
